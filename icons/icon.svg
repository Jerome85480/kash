<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="k" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a89bff"/>
      <stop offset="100%" stop-color="#7c6bff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- K letter -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="290" font-weight="900" fill="url(#k)">K</text>
  <!-- Coin accent -->
  <circle cx="390" cy="140" r="42" fill="none" stroke="#4ade80" stroke-width="10" opacity=".8"/>
  <text x="390" y="155" text-anchor="middle" font-size="38" fill="#4ade80" font-weight="bold">€</text>
</svg>
